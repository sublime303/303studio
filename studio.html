<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>303 Studio</title>
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Studio shell + shared primitives -->
  <link rel="stylesheet" href="css/studio.css">

  <!-- Per-instrument styles -->
  <link rel="stylesheet" href="css/tb303.css?v=3">
  <link rel="stylesheet" href="css/tr808.css">
  <link rel="stylesheet" href="css/tr909.css">
  <link rel="stylesheet" href="css/juno106.css">
  <link rel="stylesheet" href="css/minimoog.css">
  <link rel="stylesheet" href="css/jp8000.css">
  <link rel="stylesheet" href="css/dx7.css">
</head>
<body>

<!-- ── Studio header ─────────────────────────────────────────── -->
<header class="studio-header">
  <div class="studio-logo">
    <span class="studio-logo-main">303 STUDIO</span>
    <span class="studio-logo-sub">Multi-Instrument</span>
  </div>
  <div class="studio-sep"></div>
  <button id="btnPlayAll" class="studio-btn btn-play-all">▶ Play All</button>
  <button id="btnStopAll" class="studio-btn btn-stop-all">■ Stop All</button>
  <div class="studio-sep"></div>
  <div class="master-wrap">
    <span class="master-label">Master</span>
    <div id="masterKnob" class="knob-sm"><div id="masterInd" class="knob-indicator"></div></div>
  </div>
  <div class="studio-sep"></div>
  <div class="master-bpm-wrap">
    <span class="master-label">BPM</span>
    <div id="masterBpm" class="master-bpm-d">128</div>
    <div class="bpm-arrows3">
      <div id="masterBpmUp" class="bpm-arr">▲</div>
      <div id="masterBpmDn" class="bpm-arr">▼</div>
    </div>
  </div>
  <div class="studio-spacer"></div>
  <div class="studio-sep"></div>
  <div class="studio-song-actions">
    <input type="text" id="studioSongName" class="studio-song-name" placeholder="Song name" maxlength="80" aria-label="Song name for export">
    <button type="button" id="btnExportSong" class="studio-btn btn-song-export studio-song-icon-btn" title="Export whole song as JSON file" aria-label="Export whole song as JSON file">
      <svg class="studio-song-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
    </button>
    <button type="button" id="btnImportSong" class="studio-btn btn-song-import studio-song-icon-btn" title="Import whole song from JSON file" aria-label="Import whole song from JSON file">
      <svg class="studio-song-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
    </button>
    <input type="file" id="studioSongFileImport" class="studio-song-file-input" accept="application/json,.json" aria-hidden="true" tabindex="-1">
    <button type="button" id="btnSaveSongBrowser" class="studio-btn btn-song-save studio-song-icon-btn" title="Save whole song in this browser" aria-label="Save whole song in this browser">
      <svg class="studio-song-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>
    </button>
    <button type="button" id="btnLoadSongBrowser" class="studio-btn btn-song-load studio-song-icon-btn" title="Load whole song from this browser" aria-label="Load whole song from this browser">
      <svg class="studio-song-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    </button>
  </div>
  <div class="studio-sep"></div>
  <div class="add-wrap">
    <button class="add-btn" onclick="toggleAddMenu()">＋ Add Instrument</button>
    <div id="addMenu" class="add-menu">
      <!-- Populated by studio.js from StudioInstruments registry -->
    </div>
  </div>
</header>

<!-- ── Instrument rack ───────────────────────────────────────── -->
<main id="rack" class="rack">
  <div id="emptyMsg" class="empty-rack">Loading instruments…</div>
</main>

<!-- ── Core utilities (load first) ──────────────────────────── -->
<script src="js/core/utils.js"></script>
<script src="js/core/knob.js"></script>
<script src="js/core/bus.js"></script>

<!-- ── TB-303 (v= cache-bust for Cloudflare) ─────────────────── -->
<script src="js/instruments/tb303/tb303-engine.js?v=3"></script>
<script src="js/instruments/tb303/tb303-seq.js?v=3"></script>
<script src="js/instruments/tb303/tb303-presets.js?v=3"></script>
<script src="js/instruments/tb303/tb303.js?v=3"></script>

<script src="js/instruments/tr808/tr808-seq.js"></script>

<!-- ── TR-909 ────────────────────────────────────────────────── -->

<script src="js/instruments/tr909/tr909-seq.js"></script>
<script src="js/instruments/tr909/tr909-presets.js"></script>
<script src="js/instruments/tr909/tr909.js"></script>

<!-- ── Juno-106 ──────────────────────────────────────────────── -->
<script src="js/instruments/juno106/juno106-engine.js"></script>
<script src="js/instruments/juno106/juno106-seq.js"></script>
<script src="js/instruments/juno106/juno106-presets.js"></script>
<script src="js/instruments/juno106/juno106.js"></script>

<!-- ── Minimoog ──────────────────────────────────────────── -->
<script src="js/instruments/minimoog/minimoog-engine.js"></script>
<script src="js/instruments/minimoog/minimoog-seq.js"></script>
<script src="js/instruments/minimoog/minimoog-presets.js"></script>
<script src="js/instruments/minimoog/minimoog.js"></script>

<!-- ── JP-8000 ───────────────────────────────────────────── -->
<script src="js/instruments/jp8000/jp8000-engine.js"></script>
<script src="js/instruments/jp8000/jp8000-seq.js"></script>
<script src="js/instruments/jp8000/jp8000-presets.js"></script>
<script src="js/instruments/jp8000/jp8000.js"></script>

<!-- ── DX7 ───────────────────────────────────────────────── -->
<script src="js/instruments/dx7/dx7-engine.js"></script>
<script src="js/instruments/dx7/dx7-seq.js"></script>
<script src="js/instruments/dx7/dx7-presets.js"></script>
<script src="js/instruments/dx7/dx7.js"></script>

<!-- ── New instruments: add CSS link + 4 script tags above this line ── -->

<!-- ── Studio core (must be last) ───────────────────────────── -->
<script src="js/core/studio.js?v=3"></script>

</body>
</html>
